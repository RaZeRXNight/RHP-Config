# Idle lock + display-off + suspend, and lock-on-sleep (covers lid-close too)
# https://wiki.hyprland.org/Hypr-Ecosystem/hypridle

general {
    lock_cmd = qs -c ii msg lock activate          # lock before suspend
    before_sleep_cmd = qs -c ii msg lock activate  # also lock on lid-close sleep
    after_sleep_cmd = hyprctl dispatch dpms on      # avoid pressing a key twice to wake
}

# Slowly dim the screen starting at half the lock timeout (2.5 min),
# reaching a floor by the time the screen locks at 5 min.
listener {
    timeout = 150
    on-timeout = bash -c 'brightnessctl info | grep -oP "(?<=\()\d+(?=%)" > /tmp/rhp-pre-dim-brightness; nohup /home/razer/.local/bin/rhp-dim 150 10 >/dev/null 2>&1 &'
    on-resume = bash -c 'pkill -f rhp-dim; pre=$(cat /tmp/rhp-pre-dim-brightness 2>/dev/null); [ -n "$pre" ] && brightnessctl set "${pre}%" >/dev/null'
}

# Lock the screen after 5 min idle
listener {
    timeout = 300
    on-timeout = qs -c ii msg lock activate
}

# Suspend 6 seconds after locking
listener {
    timeout = 306
    on-timeout = systemctl suspend
}
