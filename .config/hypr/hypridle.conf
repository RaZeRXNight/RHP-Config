# Idle lock + display-off + suspend, and lock-on-sleep (covers lid-close too)
# https://wiki.hyprland.org/Hypr-Ecosystem/hypridle

general {
    lock_cmd = qs -c ii msg lock activate          # lock before suspend
    before_sleep_cmd = qs -c ii msg lock activate  # also lock on lid-close sleep
    after_sleep_cmd = hyprctl dispatch dpms on      # avoid pressing a key twice to wake
}

# Lock the screen after 5 min idle
listener {
    timeout = 300
    on-timeout = qs -c ii msg lock activate
}

# Turn the display off after ~5.3 min idle (saves power before suspend)
listener {
    timeout = 320
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend after 10 min idle
listener {
    timeout = 600
    on-timeout = systemctl suspend
}
